name: cast-gnn
channels:
  - pytorch
  - nvidia
  - conda-forge
  - defaults

dependencies:
  # Core runtime
  - python=3.10
  - pip>=23.0

  # Numerical and scientific computing
  - numpy>=1.24
  - scipy>=1.10
  - pandas>=2.0
  - scikit-learn>=1.3
  - statsmodels>=0.14
  - joblib>=1.3
  - tqdm>=4.66
  - pyyaml>=6.0

  # EEG processing
  - mne>=1.5
  - pyedflib>=0.1.36

  # Plotting and reporting
  - matplotlib>=3.7
  - seaborn>=0.13

  # PyTorch
  # For CPU-only installation, remove pytorch-cuda and install the CPU build manually if needed.
  - pytorch>=2.1
  - torchvision>=0.16
  - torchaudio>=2.1
  - pytorch-cuda=11.8

  # Development and reliability
  - ipykernel
  - pytest>=7.4
  - black>=23.0
  - isort>=5.12
  - ruff>=0.1

  - pip:
      # Optional but useful for feature baselines and progress reporting.
      - xgboost>=2.0
      - einops>=0.7
      - rich>=13.0
